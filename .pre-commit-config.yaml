repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^vendor/
      - id: end-of-file-fixer
        exclude: ^vendor/
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: '\.wasm$'

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: env GOWORK=off golangci-lint run
        types: [go]
        pass_filenames: false
